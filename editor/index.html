<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dad's App — Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F8F9FA;--card:#FFF;--primary:#E8650A;--primary-light:#FFF3EC;
  --text:#1A1A1A;--muted:#666;--border:#E5E7EB;--radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);--danger:#C94040;--success:#2E9E5B;
  --sidebar:260px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10;
}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.sidebar-logo h1{font-size:1.1rem;font-weight:900;color:var(--primary);}
.sidebar-logo p{font-size:0.78rem;color:var(--muted);font-weight:600;}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0;}
.nav-section{padding:6px 20px 4px;font-size:0.7rem;font-weight:900;text-transform:uppercase;letter-spacing:0.08em;color:#AAA;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 20px;
  cursor:pointer;border-radius:0;font-size:0.9rem;font-weight:700;
  color:var(--muted);transition:all 0.15s;border:none;background:none;width:100%;text-align:left;
}
.nav-item:hover{background:var(--bg);color:var(--text);}
.nav-item.active{background:var(--primary-light);color:var(--primary);}
.nav-item .icon{font-size:1.1rem;width:22px;text-align:center;}
.nav-item .badge{margin-left:auto;background:var(--border);border-radius:99px;padding:1px 7px;font-size:0.7rem;font-weight:900;}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}
.conn-status{font-size:0.8rem;font-weight:700;display:flex;align-items:center;gap:7px;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#CCC;}
.conn-dot.ok{background:var(--success);}
.conn-dot.err{background:var(--danger);}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:5;
}
.topbar h2{font-size:1.2rem;font-weight:900;}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.content{padding:28px;flex:1;}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 18px;
  border-radius:10px;font-family:'Nunito',sans-serif;font-weight:800;
  font-size:0.88rem;cursor:pointer;border:none;transition:all 0.15s;
}
.btn-primary{background:var(--primary);color:white;}
.btn-primary:hover{background:#D4580A;}
.btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-danger{background:var(--danger);color:white;}
.btn-danger:hover{background:#A83030;}
.btn-success{background:var(--success);color:white;}
.btn-success:hover{background:#267A47;}
.btn-ghost{background:none;color:var(--muted);padding:7px 12px;}
.btn-ghost:hover{background:var(--bg);color:var(--text);}
.btn-sm{padding:6px 12px;font-size:0.8rem;}
.btn-icon{padding:7px;border-radius:8px;}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-header h3{font-size:1rem;font-weight:900;}

/* ── FORMS ── */
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:0.82rem;font-weight:800;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;}
.form-input{
  width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:600;
  background:var(--card);color:var(--text);transition:border-color 0.15s;
}
.form-input:focus{outline:none;border-color:var(--primary);}
textarea.form-input{resize:vertical;min-height:90px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-hint{font-size:0.78rem;color:var(--muted);margin-top:4px;font-weight:600;}

/* ── SUBJECT GRID ── */
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.subject-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:18px 16px;cursor:pointer;transition:all 0.15s;border:2px solid transparent;
  display:flex;flex-direction:column;gap:8px;position:relative;
}
.subject-card:hover{border-color:var(--primary);transform:translateY(-1px);}
.subject-card .sub-icon{font-size:2rem;}
.subject-card .sub-name{font-size:1rem;font-weight:900;}
.subject-card .sub-meta{font-size:0.78rem;color:var(--muted);font-weight:700;}
.subject-card .sub-mode{
  display:inline-block;font-size:0.7rem;font-weight:900;padding:2px 8px;
  border-radius:99px;background:var(--primary-light);color:var(--primary);
}
.subject-card .sub-actions{display:flex;gap:6px;margin-top:4px;}
.subject-top-bar{height:5px;border-radius:5px 5px 0 0;position:absolute;top:0;left:0;right:0;}

/* ── QUESTION LIST ── */
.question-list{display:flex;flex-direction:column;gap:8px;}
.question-item{
  background:var(--bg);border-radius:10px;padding:12px 14px;
  display:flex;align-items:flex-start;gap:12px;
}
.q-emoji{font-size:1.5rem;flex-shrink:0;margin-top:2px;}
.q-body{flex:1;min-width:0;}
.q-text{font-size:0.9rem;font-weight:700;margin-bottom:3px;}
.q-meta{font-size:0.75rem;color:var(--muted);font-weight:600;display:flex;gap:8px;flex-wrap:wrap;}
.q-type-badge{
  display:inline-block;padding:1px 7px;border-radius:99px;font-size:0.7rem;font-weight:900;
}
.q-type-yn  {background:#E8F5E9;color:#2E7D32;}
.q-type-tf  {background:#E3F2FD;color:#1565C0;}
.q-type-ch  {background:#FFF3E0;color:#E65100;}
.q-type-snd {background:#F3E5F5;color:#6A1B9A;}
.q-actions{display:flex;gap:4px;flex-shrink:0;}

/* ── ASSET GRID ── */
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
.asset-item{
  background:var(--bg);border-radius:10px;overflow:hidden;
  aspect-ratio:1;display:flex;flex-direction:column;position:relative;
}
.asset-thumb{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:2rem;background:#EEE;
}
.asset-thumb img,.asset-thumb video{width:100%;height:100%;object-fit:cover;}
.asset-name{padding:5px 6px;font-size:0.7rem;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.asset-delete{
  position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:white;
  border:none;border-radius:6px;padding:3px 6px;cursor:pointer;font-size:0.7rem;
}

/* ── UPLOAD ZONE ── */
.upload-zone{
  border:2px dashed var(--border);border-radius:12px;padding:28px;
  text-align:center;cursor:pointer;transition:all 0.15s;
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--primary);background:var(--primary-light);}
.upload-zone p{font-size:0.9rem;font-weight:700;color:var(--muted);}
.upload-zone .icon{font-size:2rem;margin-bottom:8px;}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:var(--card);border-radius:20px;width:100%;max-width:560px;
  max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.modal-header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:1.1rem;font-weight:900;}
.modal-body{padding:20px 24px;}
.modal-footer{padding:0 24px 20px;display:flex;gap:10px;justify-content:flex-end;}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:20px;}
.tab{
  flex:1;padding:8px;text-align:center;border-radius:8px;cursor:pointer;
  font-size:0.85rem;font-weight:800;color:var(--muted);border:none;background:none;
  transition:all 0.15s;
}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1);}

/* ── TOGGLE ── */
.toggle-group{display:flex;flex-direction:column;gap:8px;}
.toggle-option{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-radius:10px;border:2px solid var(--border);cursor:pointer;
  transition:all 0.15s;background:none;text-align:left;width:100%;
  font-family:'Nunito',sans-serif;
}
.toggle-option.selected{border-color:var(--primary);background:var(--primary-light);}
.toggle-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.toggle-option.selected .toggle-radio{border-color:var(--primary);}
.toggle-radio-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);display:none;}
.toggle-option.selected .toggle-radio-dot{display:block;}
.toggle-label{font-size:0.9rem;font-weight:800;}
.toggle-desc{font-size:0.78rem;color:var(--muted);font-weight:600;}

/* ── PEOPLE ── */
.person-card{
  background:var(--bg);border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;gap:14px;margin-bottom:8px;
}
.person-avatar{
  width:48px;height:48px;border-radius:50%;background:var(--border);
  overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;
}
.person-avatar img{width:100%;height:100%;object-fit:cover;}
.person-info{flex:1;}
.person-name{font-size:0.95rem;font-weight:900;}
.person-relation{font-size:0.78rem;color:var(--muted);font-weight:700;}
.person-photos{font-size:0.75rem;color:var(--muted);font-weight:600;}

/* ── MESSAGES ── */
.message-card{
  background:var(--bg);border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;gap:14px;margin-bottom:8px;
}
.message-icon{font-size:2rem;flex-shrink:0;}
.message-info{flex:1;}
.message-from{font-size:0.95rem;font-weight:900;}
.message-q{font-size:0.8rem;color:var(--muted);font-weight:600;}

/* ── AI GENERATE ── */
.generate-result{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.gen-item{
  background:var(--bg);border-radius:10px;padding:12px 14px;
  display:flex;align-items:flex-start;gap:10px;
}
.gen-check{flex-shrink:0;margin-top:2px;}
.gen-check input{width:16px;height:16px;cursor:pointer;}
.gen-body{flex:1;}
.gen-q{font-size:0.88rem;font-weight:700;}
.gen-meta{font-size:0.75rem;color:var(--muted);font-weight:600;margin-top:2px;}

/* ── COLOUR PICKER ── */
.colour-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.colour-swatch{
  width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;
  transition:transform 0.1s;
}
.colour-swatch:hover,.colour-swatch.selected{border-color:var(--text);transform:scale(1.1);}

/* ── EMOJI PICKER ── */
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.emoji-opt{font-size:1.5rem;cursor:pointer;padding:4px;border-radius:6px;border:2px solid transparent;}
.emoji-opt:hover,.emoji-opt.selected{border-color:var(--primary);background:var(--primary-light);}

/* ── ALERTS ── */
.alert{padding:12px 16px;border-radius:10px;font-size:0.88rem;font-weight:700;margin-bottom:16px;}
.alert-info{background:#E3F2FD;color:#1565C0;}
.alert-success{background:#E8F5E9;color:#2E7D32;}
.alert-error{background:#FFEBEE;color:#C62828;}

/* ── LOADING ── */
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.8);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loading-overlay p{font-size:1rem;font-weight:800;color:var(--muted);}
.loading-spinner-lg{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .main{margin-left:0;}
}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:20px 0;}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:12px;}
.empty h3{font-size:1rem;font-weight:900;margin-bottom:6px;}
.empty p{font-size:0.85rem;font-weight:600;}

/* ── PUBLISH BAR ── */
.publish-bar{
  background:var(--card);border-top:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;bottom:0;
}
.publish-bar p{font-size:0.85rem;font-weight:700;color:var(--muted);}
.publish-status{font-size:0.82rem;font-weight:700;}

/* ── ICON BUTTON SIZES ── */
.icon-lg{font-size:1.3rem;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>🎮 Dad's App</h1>
    <p>Content Editor</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Content</div>
    <button class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
      <span class="icon">🏠</span> Dashboard
    </button>
    <div class="nav-section">Settings</div>
    <button class="nav-item" onclick="navigate('settings')" id="nav-settings">
      <span class="icon">⚙️</span> Settings
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="conn-status">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">Not connected</span>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <h2 id="topbar-title">Dashboard</h2>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>

  <div class="content" id="content"></div>

  <div class="publish-bar">
    <p id="publish-status-text">Save your changes then publish to update the app.</p>
    <button class="btn btn-success" onclick="publishAll()" id="btn-publish">🚀 Publish to App</button>
  </div>
</main>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading" style="display:none">
  <div class="loading-spinner-lg"></div>
  <p id="loading-msg">Working…</p>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>

<script>
'use strict';

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let S = {
  workerUrl: '',
  editorSecret: '',
  appName: "Dad's Happy Time",
  defaultMode: 'great',
  subjects: {},   // key → { label, icon, color, mode, assets, people, messages, questions }
  dirty: false,
};

// Load state from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('dads_editor_v1');
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.assign(S, parsed);
    }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('dads_editor_v1', JSON.stringify(S));
  S.dirty = true;
  document.getElementById('publish-status-text').textContent = 'You have unpublished changes.';
}

// ═══════════════════════════════════════
//  API CALLS
// ═══════════════════════════════════════
async function api(method, path, body, isFormData = false) {
  if (!S.workerUrl) throw new Error('Worker URL not configured. Go to Settings first.');
  const url = S.workerUrl.replace(/\/$/, '') + path;
  const headers = {};
  if (S.editorSecret) headers['X-Editor-Secret'] = S.editorSecret;
  if (!isFormData && body) headers['Content-Type'] = 'application/json';

  const res = await fetch(url, {
    method,
    headers,
    body: body ? (isFormData ? body : JSON.stringify(body)) : undefined,
  });

  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { data = text; }

  if (!res.ok) throw new Error(data?.error || text || `HTTP ${res.status}`);
  return data;
}

async function ping() {
  try {
    await api('GET', '/api/ping');
    document.getElementById('conn-dot').className = 'conn-dot ok';
    document.getElementById('conn-label').textContent = 'Connected';
    return true;
  } catch(e) {
    document.getElementById('conn-dot').className = 'conn-dot err';
    document.getElementById('conn-label').textContent = 'Not connected';
    return false;
  }
}

async function uploadAsset(key, file) {
  const url = S.workerUrl.replace(/\/$/, '') + `/api/upload?key=${encodeURIComponent(key)}`;
  const headers = { 'Content-Type': file.type || 'application/octet-stream' };
  if (S.editorSecret) headers['X-Editor-Secret'] = S.editorSecret;
  const res = await fetch(url, { method: 'POST', headers, body: file });
  if (!res.ok) throw new Error(`Upload failed: ${res.status}`);
  return await res.json();
}

// ═══════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════
let currentScreen = 'dashboard';
let currentSubject = null;

function navigate(screen, subjectKey = null) {
  currentScreen = screen;
  currentSubject = subjectKey;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + screen);
  if (navEl) navEl.classList.add('active');

  const titles = {
    dashboard: 'Dashboard',
    settings: 'Settings',
    subject: subjectKey ? (S.subjects[subjectKey]?.label || 'Subject') : 'Subject',
    generate: 'Generate Questions with AI',
  };
  document.getElementById('topbar-title').textContent = titles[screen] || screen;

  const renders = {
    dashboard: renderDashboard,
    settings: renderSettings,
    subject: () => renderSubject(subjectKey),
    generate: () => renderGenerate(subjectKey),
  };
  (renders[screen] || renderDashboard)();
}

// ═══════════════════════════════════════
//  LOADING
// ═══════════════════════════════════════
function showLoading(msg = 'Working…') {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}

// ═══════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════
function showModal(html) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:80px;right:24px;z-index:300;padding:12px 18px;
    border-radius:10px;font-weight:800;font-size:0.88rem;box-shadow:0 4px 20px rgba(0,0,0,0.2);
    background:${type==='error'?'#C94040':type==='info'?'#2E6FBF':'#2E9E5B'};color:white;
    animation:fadeIn 0.2s ease;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ═══════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════
function renderDashboard() {
  const actions = `<button class="btn btn-primary" onclick="showNewSubjectModal()">+ New Subject</button>`;
  document.getElementById('topbar-actions').innerHTML = actions;

  const keys = Object.keys(S.subjects);
  let html = '';

  if (!S.workerUrl) {
    html += `<div class="alert alert-info">⚙️ Please go to <strong>Settings</strong> first to enter your Worker URL.</div>`;
  }

  if (keys.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon">📋</div>
      <h3>No subjects yet</h3>
      <p>Click "New Subject" to get started, or load the default subjects below.</p>
      <br>
      <button class="btn btn-secondary" onclick="loadDefaults()">Load Default Subjects</button>
    </div>`;
  } else {
    html += `<div class="subject-grid">`;
    for (const key of keys) {
      const sub = S.subjects[key];
      const qCount = (sub.questions || []).length;
      const assetCount = Object.values(sub.assets || {}).flat().length + (sub.people||[]).length + (sub.messages||[]).length;
      html += `
        <div class="subject-card" onclick="navigate('subject','${key}')">
          <div class="subject-top-bar" style="background:${sub.color}"></div>
          <div class="sub-icon">${sub.icon}</div>
          <div class="sub-name">${sub.label}</div>
          <div class="sub-meta">${qCount} questions · ${assetCount} assets</div>

// ── Asset tabs ───────────────────────────────────────────────────────────────
let currentAssetTab = 'images';
function switchAssetTab(tab, key) {
  currentAssetTab = tab;
  document.querySelectorAll('#asset-tabs .tab').forEach((el,i) => {
    el.classList.toggle('active', ['images','sounds','music','videos'][i] === tab);
  });
  document.getElementById('asset-panel').innerHTML = renderAssetPanel(key, tab);
}

function renderAssetPanel(key, tab) {
  const sub = S.subjects[key];
  const assets = (sub.assets?.[tab] || []);
  const accept = {images:'image/*',sounds:'audio/*',music:'audio/*',videos:'video/*'}[tab];
  const icon   = {images:'📷',sounds:'🔊',music:'🎵',videos:'🎬'}[tab];

  let html = `
    <div class="upload-zone" id="upload-zone-${tab}"
      onclick="document.getElementById('file-input-${tab}').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event,'${tab}','${key}')">
      <div class="icon">${icon}</div>
      <p>Click or drag ${tab} here to upload</p>
    </div>
    <input type="file" id="file-input-${tab}" accept="${accept}" multiple style="display:none"
      onchange="handleFileSelect(event,'${tab}','${key}')">`;

  if (assets.length) {
    html += `<div class="asset-grid" style="margin-top:14px">`;
    assets.forEach((filename, i) => {
      const assetKey = `assets/${key}/${tab}/${filename}`;
      const assetUrl = S.workerUrl ? `${S.workerUrl.replace(/\/$/,'')}/assets/${key}/${tab}/${encodeURIComponent(filename)}` : '';
      let thumb = icon;
      if (tab === 'images' && assetUrl) {
        thumb = `<img src="${assetUrl}" onerror="this.parentElement.textContent='📷'">`;
      } else if (tab === 'videos' && assetUrl) {
        thumb = `<video src="${assetUrl}" muted></video>`;
      }
      html += `
        <div class="asset-item">
          <div class="asset-thumb">${thumb}</div>
          <div class="asset-name">${filename}</div>
          <button class="asset-delete" onclick="deleteAsset('${key}','${tab}',${i})">✕</button>
        </div>`;
    });
    html += `</div>`;
  }
  return html;
}

async function handleFileSelect(event, tab, key) {
  const files = Array.from(event.target.files);
  await uploadFiles(files, tab, key);
  event.target.value = '';
}
async function handleDrop(event, tab, key) {
  event.preventDefault();
  document.getElementById('upload-zone-'+tab)?.classList.remove('drag');
  const files = Array.from(event.dataTransfer.files);
  await uploadFiles(files, tab, key);
}

async function uploadFiles(files, tab, key) {
  if (!S.workerUrl) { toast('Configure Worker URL in Settings first', 'error'); return; }
  showLoading(`Uploading ${files.length} file(s)…`);
  let ok = 0, fail = 0;
  for (const file of files) {
    try {
      const assetKey = `assets/${key}/${tab}/${file.name}`;
      await uploadAsset(assetKey, file);
      if (!S.subjects[key].assets) S.subjects[key].assets = {images:[],sounds:[],music:[],videos:[]};
      if (!S.subjects[key].assets[tab]) S.subjects[key].assets[tab] = [];
      if (!S.subjects[key].assets[tab].includes(file.name)) {
        S.subjects[key].assets[tab].push(file.name);
      }
      ok++;
    } catch(e) { fail++; console.error(e); }
  }
  saveState();
  hideLoading();
  if (ok) toast(`Uploaded ${ok} file(s)`);
  if (fail) toast(`${fail} upload(s) failed`, 'error');
  switchAssetTab(tab, key);
}

async function deleteAsset(key, tab, index) {
  const filename = S.subjects[key].assets[tab][index];
  if (!confirm(`Remove ${filename}?`)) return;
  try {
    const assetKey = `assets/${key}/${tab}/${filename}`;
    await api('DELETE', '/api/asset', { key: assetKey });
    S.subjects[key].assets[tab].splice(index, 1);
    saveState();
    switchAssetTab(tab, key);
    toast('Asset removed');
  } catch(e) {
    toast('Failed to delete: ' + e.message, 'error');
  }
}

async function addPerson(key) {
  const name = document.getElementById('person-name').value.trim();
  const relation = document.getElementById('person-relation').value.trim();
  if (!name) { toast('Name is required', 'error'); return; }

  const person = { name, relation, images:[] };

  const photoFile = document.getElementById('person-photo').files[0];
  if (photoFile && S.workerUrl) {
    showLoading('Uploading photo…');
    const assetKey = `assets/${key}/people/${name.toLowerCase().replace(/\s+/g,'_')}_avatar.jpg`;
    await uploadAsset(assetKey, photoFile);
    person.avatar = `${S.workerUrl.replace(/\/$/,'')}/assets/${key}/people/${name.toLowerCase().replace(/\s+/g,'_')}_avatar.jpg`;
    hideLoading();
  }

  if (!S.subjects[key].people) S.subjects[key].people = [];
  S.subjects[key].people.push(person);

  // Auto-generate people questions
  generatePeopleQuestions(key, person);

  saveState();
  closeModal();
  navigate('subject', key);
  toast(`${name} added`);
}

function generatePeopleQuestions(key, person) {
  const sub = S.subjects[key];
  if (!sub.questions) sub.questions = [];

  // Collect other people in this subject for distractors
  const otherPeople = (sub.people || []).filter(p => p.name !== person.name);

  // Q1 — "Who is this?" — name choice
  const nameDistractor = otherPeople.length > 0
    ? otherPeople[Math.floor(Math.random() * otherPeople.length)].name
    : '???';
  sub.questions.push({
    type: 'ch',
    emoji: '👤',
    bg: '#FCE4EC',
    q: 'Who is this?',
    a: person.name,
    b: nameDistractor,
    personId: person.name,
  });

  // Q2 — "This is your…" — relationship choice
  if (person.relation) {
    const otherRelations = otherPeople
      .filter(p => p.relation && p.relation !== person.relation)
      .map(p => p.relation);
    const wrongRelation = otherRelations.length > 0
      ? otherRelations[Math.floor(Math.random() * otherRelations.length)]
      : 'friend';
    const correctLeft = Math.random() < 0.5;
    sub.questions.push({
      type: 'ch',
      emoji: '👤',
      bg: '#FCE4EC',
      q: 'This is your…',
      a: correctLeft ? person.relation : wrongRelation,
      b: correctLeft ? wrongRelation   : person.relation,
      correctAnswer: correctLeft ? 'a' : 'b',
      personId: person.name,
    });
  }
}

function deletePerson(key, index) {
  const name = S.subjects[key].people[index]?.name;
  if (!confirm(`Remove ${name}?`)) return;
  S.subjects[key].people.splice(index, 1);
  saveState();
  navigate('subject', key);
}

function showAddQuestionModal(key, editIndex = -1) {
  const sub = S.subjects[key];
  const q = editIndex >= 0 ? sub.questions[editIndex] : { type:'yn', emoji:'❓', bg:'#F5F5F5', q:'' };
  const isEdit = editIndex >= 0;

  // Build image picker from uploaded images for this subject
  const images = sub.assets?.images || [];
  let imagePicker = '';
  if (images.length) {
    const currentImg = q.imgFile || '';
    imagePicker = `
      <div class="form-group">
        <label class="form-label">Image (optional)</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px" id="img-picker">
          <div class="img-pick-opt${!currentImg?' selected':''}" onclick="selectQImage('')"
            style="width:64px;height:64px;border-radius:8px;border:2px solid var(--border);
            display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.4rem;
            ${!currentImg?'border-color:var(--primary);background:var(--primary-light)':''}">
            🚫
          </div>
          ${images.map(f => {
            const url = S.workerUrl ? `${S.workerUrl.replace(/\/$/,'')}/assets/${key}/images/${encodeURIComponent(f)}` : '';
            const selected = currentImg === f;
            return `<div class="img-pick-opt${selected?' selected':''}"
              onclick="selectQImage('${f}')"
              style="width:64px;height:64px;border-radius:8px;border:2px solid ${selected?'var(--primary)':'var(--border)'};
              overflow:hidden;cursor:pointer;position:relative;flex-shrink:0;
              ${selected?'box-shadow:0 0 0 2px var(--primary)':''}">
              <img src="${url}" style="width:100%;height:100%;object-fit:cover"
                onerror="this.parentElement.style.display='none'">
            </div>`;
          }).join('')}
        </div>
        <input type="hidden" id="q-img-file" value="${q.imgFile||''}">
        <div class="form-hint">Click an image to assign it to this question. Click 🚫 for no image.</div>
      </div>`;
  }

  showModal(`
    <div class="modal">
      <div class="modal-header">
        <h3>${isEdit ? 'Edit' : 'Add'} Question</h3>
        <button class="btn btn-ghost btn-icon" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Question Type</label>
          <select class="form-input" id="q-type" onchange="updateQForm()">
            <option value="yn"  ${q.type==='yn' ?'selected':''}>Yes / No</option>
            <option value="tf"  ${q.type==='tf' ?'selected':''}>True / False</option>
            <option value="ch"  ${q.type==='ch' ?'selected':''}>Choice (two options)</option>
            <option value="snd" ${q.type==='snd'?'selected':''}>Sound question</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Question Text</label>
          <textarea class="form-input" id="q-text" rows="2">${q.q}</textarea>
        </div>
        ${imagePicker}
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Fallback Emoji (shown if no image)</label>
            <input class="form-input" id="q-emoji" value="${q.emoji||'❓'}" style="font-size:1.3rem;width:70px">
          </div>
          <div class="form-group">
            <label class="form-label">Background Colour</label>
            <input type="color" class="form-input" id="q-bg" value="${q.bg||'#F5F5F5'}" style="height:42px;padding:4px">
          </div>
        </div>
        <div id="q-extra"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveQuestion('${key}',${editIndex})">${isEdit?'Save':'Add Question'}</button>
      </div>
    </div>`);

  // Pre-fill extra fields
  setTimeout(() => { updateQForm(q); }, 50);
}

function selectQImage(filename) {
  document.getElementById('q-img-file').value = filename;
  // Update visual selection
  document.querySelectorAll('.img-pick-opt').forEach(el => {
    el.style.borderColor = 'var(--border)';
    el.style.boxShadow = '';
    el.style.background = '';
  });
  event.currentTarget.style.borderColor = 'var(--primary)';
  event.currentTarget.style.boxShadow = '0 0 0 2px var(--primary)';
  if (!filename) event.currentTarget.style.background = 'var(--primary-light)';
}

function updateQForm(existing = null) {
  const type = document.getElementById('q-type')?.value;
  const extra = document.getElementById('q-extra');
  if (!extra) return;

  if (type === 'tf') {
    extra.innerHTML = `
      <div class="form-group">
        <label class="form-label">Correct Answer</label>
        <select class="form-input" id="q-ans">
          <option value="true"  ${existing?.ans===true ?'selected':''}>True</option>
          <option value="false" ${existing?.ans===false?'selected':''}>False</option>
        </select>
      </div>`;
  } else if (type === 'ch' || type === 'snd') {
    extra.innerHTML = `
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Option A (left button)</label>
          <input class="form-input" id="q-a" placeholder="e.g. ⛳ Golf" value="${existing?.a||''}">
        </div>
        <div class="form-group">
          <label class="form-label">Option B (right button)</label>
          <input class="form-input" id="q-b" placeholder="e.g. 🎾 Tennis" value="${existing?.b||''}">
        </div>
      </div>
      ${type==='snd' ? `
      <div class="form-group">
        <label class="form-label">Sound to play</label>
        <select class="form-input" id="q-sound">
          ${['rain','wind','thunder','birds','waves','piano','drums','trumpet'].map(s=>`<option value="${s}"${existing?.sound===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>` : ''}`;
  } else {
    extra.innerHTML = '';
  }
}

function saveQuestion(key, editIndex) {
  const type  = document.getElementById('q-type').value;
  const qText = document.getElementById('q-text').value.trim();
  const emoji = document.getElementById('q-emoji').value.trim() || '❓';
  const bg    = document.getElementById('q-bg').value;
  const imgFile = document.getElementById('q-img-file')?.value || '';

  if (!qText) { toast('Question text is required', 'error'); return; }

  const q = { type, q: qText, emoji, bg };
  if (imgFile) q.imgFile = imgFile;

  if (type === 'tf') {
    q.ans = document.getElementById('q-ans').value === 'true';
  } else if (type === 'ch' || type === 'snd') {
    q.a = document.getElementById('q-a')?.value.trim() || 'Option A';
    q.b = document.getElementById('q-b')?.value.trim() || 'Option B';
    if (type === 'snd') q.sound = document.getElementById('q-sound')?.value || 'rain';
  }

  const sub = S.subjects[key];
  if (!sub.questions) sub.questions = [];

  if (editIndex >= 0) {
    sub.questions[editIndex] = q;
    toast('Question updated');
  } else {
    sub.questions.push(q);
    toast('Question added');
  }

  saveState();
  closeModal();
  navigate('subject', key);
}

function showEditQuestionModal(key, index) {
  showAddQuestionModal(key, index);
}

function deleteQuestion(key, index) {
  if (!confirm('Delete this question?')) return;
  S.subjects[key].questions.splice(index, 1);
  saveState();
  navigate('subject', key);
}

// ═══════════════════════════════════════
//  AI QUESTION GENERATOR
// ═══════════════════════════════════════
let generatedQuestions = [];

function renderGenerate(key) {
  const sub = S.subjects[key] || {};
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-secondary" onclick="navigate('subject','${key}')">← Back to ${sub.label||'Subject'}</button>`;

  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:680px">
      <div class="card-header"><h3>✨ Generate Questions with AI</h3></div>

      <div class="form-group">
        <label class="form-label">Subject Name</label>
        <input class="form-input" id="gen-name" value="${sub.label||''}" placeholder="e.g. Sports, Music…">
      </div>
      <div class="form-group">
        <label class="form-label">Describe this subject for your loved one</label>
        <textarea class="form-input" id="gen-desc" rows="4" placeholder="e.g. He loved playing golf for 40 years. Favourite golfer was Jack Nicklaus. Also enjoyed watching hockey, especially the Toronto Maple Leafs."></textarea>
        <div class="form-hint">The more detail you give, the more personalised the questions will be.</div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Number of Questions</label>
          <select class="form-input" id="gen-count">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15" selected>15</option>
            <option value="20">20</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Answer Mode</label>
          <select class="form-input" id="gen-mode">
            <option value="great" ${sub.mode!=='tryagain'?'selected':''}>Everything is Great</option>
            <option value="tryagain" ${sub.mode==='tryagain'?'selected':''}>Try Again (factual)</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Question Types to Include</label>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
          <label style="display:flex;align-items:center;gap:6px;font-weight:700;font-size:0.88rem;cursor:pointer">
            <input type="checkbox" id="gen-yn" checked> Yes/No
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-weight:700;font-size:0.88rem;cursor:pointer">
            <input type="checkbox" id="gen-tf" checked> True/False
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-weight:700;font-size:0.88rem;cursor:pointer">
            <input type="checkbox" id="gen-ch" checked> Choice
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-weight:700;font-size:0.88rem;cursor:pointer">
            <input type="checkbox" id="gen-snd"> Sound
          </label>
        </div>
      </div>
      <button class="btn btn-primary" onclick="runGenerate('${key}')" style="width:100%;justify-content:center;padding:14px">
        ✨ Generate Questions
      </button>

      <div id="gen-results"></div>
    </div>`;
}

async function runGenerate(key) {
  if (!S.workerUrl) { toast('Configure Worker URL in Settings first', 'error'); return; }

  const name = document.getElementById('gen-name').value.trim();
  const desc = document.getElementById('gen-desc').value.trim();
  if (!name || !desc) { toast('Subject name and description are required', 'error'); return; }

  const types = [];
  if (document.getElementById('gen-yn').checked) types.push('yn');
  if (document.getElementById('gen-tf').checked) types.push('tf');
  if (document.getElementById('gen-ch').checked) types.push('ch');
  if (document.getElementById('gen-snd').checked) types.push('snd');
  if (!types.length) { toast('Select at least one question type', 'error'); return; }

  const count = parseInt(document.getElementById('gen-count').value);
  const mode  = document.getElementById('gen-mode').value;

  showLoading('Asking Claude to generate questions…');
  try {
    const res = await api('POST', '/api/generate', {
      subjectName: name,
      subjectDescription: desc,
      questionCount: count,
      questionTypes: types,
      mode,
    });

    generatedQuestions = res.questions || [];
    renderGenerateResults(key);
    toast(`${generatedQuestions.length} questions generated`);
  } catch(e) {
    toast('Generation failed: ' + e.message, 'error');
  } finally { hideLoading(); }
}

function renderGenerateResults(key) {
  const el = document.getElementById('gen-results');
  if (!el) return;
  if (!generatedQuestions.length) {
    el.innerHTML = `<div class="alert alert-error" style="margin-top:16px">No questions returned.</div>`;
    return;
  }
  const typeMeta = {yn:'Yes/No',tf:'True/False',ch:'Choice',snd:'Sound'};
  el.innerHTML = `
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="font-size:1rem;font-weight:900">Generated Questions</h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="selectAllGenerated(true)">Select All</button>
        <button class="btn btn-secondary btn-sm" onclick="selectAllGenerated(false)">None</button>
        <button class="btn btn-primary btn-sm" onclick="addSelectedQuestions('${key}')">Add Selected →</button>
      </div>
    </div>
    <div class="generate-result">
      ${generatedQuestions.map((q,i) => `
        <div class="gen-item">
          <div class="gen-check"><input type="checkbox" id="gen-q-${i}" checked></div>
          <div style="font-size:1.3rem;margin:0 6px 0 0">${q.emoji||'❓'}</div>
          <div class="gen-body">
            <div class="gen-q">${q.q}</div>
            <div class="gen-meta">
              <span class="q-type-badge q-type-${q.type}">${typeMeta[q.type]||q.type}</span>
              ${q.type==='tf'?`<span>Answer: <strong>${q.ans?'True':'False'}</strong></span>`:''}
              ${q.type==='ch'||q.type==='snd'?`<span>${q.a} / ${q.b}</span>`:''}
            </div>
          </div>
        </div>`).join('')}
    </div>`;
}

function selectAllGenerated(val) {
  generatedQuestions.forEach((_,i) => {
    const cb = document.getElementById(`gen-q-${i}`);
    if (cb) cb.checked = val;
  });
}

function addSelectedQuestions(key) {
  const selected = generatedQuestions.filter((_,i) => {
    const cb = document.getElementById(`gen-q-${i}`);
    return cb && cb.checked;
  });
  if (!selected.length) { toast('No questions selected', 'error'); return; }
  if (!S.subjects[key].questions) S.subjects[key].questions = [];
  S.subjects[key].questions.push(...selected);
  saveState();
  navigate('subject', key);
  toast(`${selected.length} questions added`);
}

function renderSettings() {
  document.getElementById('topbar-actions').innerHTML = '';
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:560px">
      <div class="card-header"><h3>⚙️ Worker Connection</h3></div>
      <div class="form-group">
        <label class="form-label">Worker URL</label>
        <input class="form-input" id="s-worker-url" value="${S.workerUrl}" placeholder="https://dads-app-worker.xxx.workers.dev">
        <div class="form-hint">Your Cloudflare Worker URL from the dashboard.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Editor Secret (optional)</label>
        <input class="form-input" id="s-secret" type="password" value="${S.editorSecret}" placeholder="Leave blank if not set">
        <div class="form-hint">Must match the EDITOR_SECRET environment variable on your Worker.</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" onclick="saveSettings()">Save & Test Connection</button>
      </div>
      <div id="conn-result" style="margin-top:14px"></div>
    </div>

    <div class="card" style="max-width:560px;margin-top:20px">
      <div class="card-header"><h3>🎮 App Settings</h3></div>
      <div class="form-group">
        <label class="form-label">App Name (shown on home screen)</label>
        <input class="form-input" id="s-appname" value="${S.appName}" placeholder="Dad's Happy Time">
      </div>
      <div class="form-group">
        <label class="form-label">Default Answer Mode</label>
        <div class="toggle-group">
          <button class="toggle-option${S.defaultMode!=='tryagain'?' selected':''}" id="s-mode-great" onclick="selectSettingsMode('great')">
            <div class="toggle-radio"><div class="toggle-radio-dot"></div></div>
            <div><div class="toggle-label">✨ Everything is Great</div><div class="toggle-desc">Always positive — no wrong answers</div></div>
          </button>
          <button class="toggle-option${S.defaultMode==='tryagain'?' selected':''}" id="s-mode-tryagain" onclick="selectSettingsMode('tryagain')">
            <div class="toggle-radio"><div class="toggle-radio-dot"></div></div>
            <div><div class="toggle-label">🔄 Try Again</div><div class="toggle-desc">Gently retry wrong factual answers</div></div>
          </button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveAppSettings()">Save App Settings</button>
    </div>`;
}

function selectSettingsMode(m) {
  document.getElementById('s-mode-great').classList.toggle('selected', m==='great');
  document.getElementById('s-mode-tryagain').classList.toggle('selected', m==='tryagain');
}

async function saveSettings() {
  S.workerUrl = document.getElementById('s-worker-url').value.trim().replace(/\/$/,'');
  S.editorSecret = document.getElementById('s-secret').value;
  saveState();

  const ok = await ping();
  const el = document.getElementById('conn-result');
  el.innerHTML = ok
    ? `<div class="alert alert-success">✅ Connected successfully!</div>`
    : `<div class="alert alert-error">❌ Could not connect. Check the URL and that your Worker is deployed.</div>`;
}

function saveAppSettings() {
  S.appName = document.getElementById('s-appname').value.trim() || "Dad's Happy Time";
  S.defaultMode = document.getElementById('s-mode-great').classList.contains('selected') ? 'great' : 'tryagain';
  saveState();
  toast('App settings saved');
}

// ═══════════════════════════════════════
//  PUBLISH
// ═══════════════════════════════════════
async function publishAll() {
  if (!S.workerUrl) { toast('Configure Worker URL in Settings first', 'error'); return; }
  if (!Object.keys(S.subjects).length) { toast('No subjects to publish', 'error'); return; }

  showLoading('Publishing to app…');
  try {
    // Build manifest
    const manifest = {
      appName: S.appName,
      defaultMode: S.defaultMode,
      publishedAt: new Date().toISOString(),
      subjects: {},
    };

    // Build questions
    const questions = {};

    for (const [key, sub] of Object.entries(S.subjects)) {
      manifest.subjects[key] = {
        label: sub.label,
        icon: sub.icon,
        color: sub.color,
        mode: sub.mode,
        assets: sub.assets || { images:[], sounds:[], music:[], videos:[] },
        people: (sub.people || []).map(p => ({ name:p.name, relation:p.relation, images:p.images||[], avatar:p.avatar||null })),
        messages: (sub.messages || []).map(m => ({ file:m.file, from:m.from, question:m.question })),
      };
      questions[key] = sub.questions || [];
    }

    await api('POST', '/api/publish', { manifest, questions });

    S.dirty = false;
    document.getElementById('publish-status-text').textContent = `Last published: ${new Date().toLocaleString()}`;
    toast('Published! App will update on next load.');
  } catch(e) {
    toast('Publish failed: ' + e.message, 'error');
  } finally { hideLoading(); }
}
